<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Site</title>

<style>
/* ===== BASE UI ===== */
body{
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f0f);
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  align-items:center;
}

.logo{
  font-size:20px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc55;
}

/* CARD */
.card{
  max-width:500px;
  margin:80px auto;
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  text-align:center;

  /* animation */
  animation: fadeIn 0.6s ease-in-out;
}

/* animation */
@keyframes fadeIn{
  from{
    opacity:0;
    transform: translateY(20px);
  }
  to{
    opacity:1;
    transform: translateY(0);
  }
}

/* INPUT */
input{
  width:90%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#1f1f1f;
  color:white;
  border:1px solid #333;
  transition:0.3s;
}

input:focus{
  border-color:#00ffcc;
  box-shadow:0 0 10px #00ffcc55;
  outline:none;
}

/* BUTTON */
button{
  padding:12px 18px;
  margin:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 5px 15px rgba(0,255,204,0.2);
}

/* PRIMARY */
.primary{
  background:#00ffcc;
  color:black;
}

/* DARK */
.dark{
  background:#222;
  color:white;
}

/* RESULT */
.result{
  margin-top:15px;
  padding:15px;
  background:rgba(255,255,255,0.05);
  border:1px solid #333;
  border-radius:10px;
  animation: fadeIn 0.5s ease-in-out;
}

/* HEADINGS */
h1{
  font-size:26px;
}
p{
  opacity:0.7;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">⚡ AI Studio</div>
  <button class="dark" onclick="logout()">Logout</button>
</div>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h1>Welcome 👋</h1>
  <p>Login to continue</p>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="primary" onclick="login()">Login</button>
  <button class="dark" onclick="signup()">Sign Up</button>

  <p id="status"></p>
</div>

<!-- APP -->
<div id="appBox" class="card" style="display:none;">
  <h1>🎬 Create AI Video</h1>
  <p>Paste your YouTube link</p>

  <input id="videoUrl" placeholder="YouTube link">

  <button class="primary" onclick="generate()">Generate</button>
  <button class="dark" id="upgradeBtn" style="display:none;">
  💸 Upgrade to Pro
</button>

  <div class="result" id="result">Result will appear here...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 كودك (صحيح)
const firebaseConfig = {
  apiKey: "AIzaSyBS70yDWhJy0Dyga40Uhi4L1m_4017Fe6c",
  authDomain: "bazo-a36fe.firebaseapp.com",
  projectId: "bazo-a36fe",
  storageBucket: "bazo-a36fe.firebasestorage.app",
  messagingSenderId: "91348188690",
  appId: "1:91348188690:web:55822d524d473b918f22cb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 👤 SIGN UP
window.signup = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => document.getElementById("status").innerText = "Account created")
    .catch(e => alert(e.message));
}

// 🔑 LOGIN.ca
window.login = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => document.getElementById("status").innerText = "Logged in")
    .catch(e => alert(e.message));
}

// 🚪 LOGOUT
window.logout = function(){
  signOut(auth);
}

// 🔐 SWITCH UI
onAuthStateChanged(auth, (user) => {
  if(user){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("appBox").style.display = "block";
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("appBox").style.display = "none";
  }
});

// 🤖 AI FAKE
let used = 0;

window.generate = async function(){

  let url = document.getElementById("videoUrl").value;

  if(!url){
    alert("حط رابط YouTube");
    return;
  }

  document.getElementById("result").innerHTML = "⏳ Loading...";

  try {

    const res = await fetch("http://localhost:3000/process?url=" + url);
    const data = await res.json();

    document.getElementById("result").innerHTML = `
      🎬 Title: ${data.title}<br><br>
      👤 Author: ${data.author}<br><br>
      💡 Idea: ${data.idea}<br><br>
      ✍️ Script: ${data.script}<br><br>
      🔥 Hashtags: ${data.hashtags}
    `;

  } catch (err) {
    document.getElementById("result").innerHTML = "❌ Error connecting to server";
  }
}

document.getElementById("upgradeBtn").onclick = function(){
  alert("Payment coming soon 💳");
}

</script>
</body>
</html>
